apis:
  - aid: nexus:nexus-rest-api
    name: Nexus Repository Manager REST API
    description: >-
      Comprehensive REST API for managing repositories, components, assets, search,
      security, blob stores, capabilities, tasks, tags, staging, and scripts in
      Sonatype Nexus Repository Manager 3. The full OpenAPI specification is
      available from each Nexus instance at `/service/rest/swagger.json` and is
      explorable via the built-in Swagger UI under System Settings > API.
    humanURL: https://help.sonatype.com/repomanager3/integrations/rest-and-integration-api
    baseURL: https://your-nexus-instance.example.com/service/rest
