aid: nexus
name: Nexus Repository Manager
description: >-
  Nexus Repository Manager by Sonatype is an enterprise-grade artifact repository
  manager supporting multiple package formats including Maven, npm, Docker, PyPI,
  NuGet, RubyGems, Helm, Go, and more. It provides a central hub for managing
  software supply chain components, proxying remote repositories, hosting private
  artifacts, and grouping repositories. Nexus exposes a comprehensive REST API
  documented via an OpenAPI/Swagger specification served at
  `<nexus_url>/service/rest/swagger.json` on each instance.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
